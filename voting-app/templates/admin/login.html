{% extends "base.html" %}
{% block title %}Admin Login — Office Bearer Election{% endblock %}

{% block content %}
<div class="header">
    <h1>Office Bearer Election</h1>
    <div class="subtitle">Administration</div>
</div>

<div class="container">
    <form method="POST" style="margin-top: 24px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="password">Admin Password</label>
            <input type="password" id="password" name="password" required
                   autocomplete="off" placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary">Log In</button>
    </form>
    <p style="font-size: 12px; color: #999; margin-top: 24px; text-align: center;">
        This software is provided as-is with no warranty. See LICENSE for details.
    </p>
</div>
{% endblock %}
